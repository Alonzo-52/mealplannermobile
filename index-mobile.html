    'Simmer the broth for 20 minutes, allowing the spices and ginger to infuse — you should be able to smell the star anise and cinnamon in the steam. After 20 minutes, strain the broth through a fine sieve to remove the whole spices and ginger pieces.',

const MEAL_LABELS = { breakfast: 'Breakfast', lunch: 'Lunch' };

let state = {
  week: {}, staples: [], theme: 'auto', servings: 2, _checked: {}
};
let currentSlot = null;
let currentFilter = 'all';

// ─── Init ────────────────────────────────────────────────
function init() {
  load();
  applyTheme();
  renderDays();
  renderStaples();
  renderShopping();
  updateWeekLabel();
}

function load() {
  try {
    const s = localStorage.getItem('mp_state');
    if (s) state = { ...state, ...JSON.parse(s) };
  } catch(e) {}
}
function save() {
  localStorage.setItem('mp_state', JSON.stringify(state));
}

// ─── Theme ───────────────────────────────────────────────
function applyTheme() {
  const t = state.theme;
  if (t === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else if (t === 'light') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    const m = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.toggleAttribute('data-theme', m);
  }
}
function toggleTheme() {
  state.theme = document.documentElement.hasAttribute('data-theme') ? 'light' : 'dark';
  applyTheme();
  save();
}

// ─── Nav ─────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  const copyBar = document.getElementById('copy-bar');
  copyBar.style.display = tab === 'shopping' ? 'flex' : 'none';
  if (tab === 'shopping') renderShopping();
}

// ─── Week label ──────────────────────────────────────────
function updateWeekLabel() {
  const now = new Date();
  const monday = new Date(now);
  const day = now.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  monday.setDate(now.getDate() + diff);
  document.getElementById('week-label').textContent = new Intl.DateTimeFormat('en-GB', { day:'numeric', month:'short' }).format(monday);
}

// ─── Render days ─────────────────────────────────────────
function renderDays() {
  const now = new Date();
  const monday = new Date(now);
  const day = now.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  monday.setDate(now.getDate() + diff);

  document.getElementById('day-cards').innerHTML = DAYS.map((d, i) => {
    const date = new Date(monday);
    date.setDate(monday.getDate() + i);
    const dateStr = date.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    const bfast = state.week[d] ? state.week[d].breakfast : null;
    const lunch = state.week[d] ? state.week[d].lunch : null;
    const bfastRecipe = bfast ? RECIPES[bfast] : null;
    const lunchRecipe = lunch ? RECIPES[lunch] : null;

    return `
      <div class="day-card">
        <div class="day-header">
          <span class="day-name">${DAY_LABELS[d]}</span>
          <span class="day-date">${dateStr}</span>
        </div>
        <div class="day-meals">
          <div class="meal-slot ${bfastRecipe ? 'filled' : ''}" onclick="${bfastRecipe ? `showRecipeDetail('${bfast}')` : `handleSlotClick('${d}','breakfast')`}">
            <div class="meal-slot-icon">${bfastRecipe ? '🍳' : '+'}</div>
            <div class="meal-slot-info">
              <div class="meal-slot-type">Breakfast</div>
              ${bfastRecipe ? `<div class="meal-slot-name">${bfastRecipe.name}</div>` : `<div class="meal-slot-empty">Tap to add</div>`}
            </div>
            ${bfastRecipe
              ? `<button class="meal-slot-remove" onclick="event.stopPropagation(); clearSlot('${d}','breakfast')">×</button>`
              : `<div class="meal-slot-arrow">+</div>`}
          </div>
          <div class="meal-slot ${lunchRecipe ? 'filled' : ''}" onclick="${lunchRecipe ? `showRecipeDetail('${lunch}')` : `handleSlotClick('${d}','lunch')`}">
            <div class="meal-slot-icon">${lunchRecipe ? '🥗' : '+'}</div>
            <div class="meal-slot-info">
              <div class="meal-slot-type">Lunch</div>
              ${lunchRecipe ? `<div class="meal-slot-name">${lunchRecipe.name}</div>` : `<div class="meal-slot-empty">Tap to add</div>`}
            </div>
            ${lunchRecipe
              ? `<button class="meal-slot-remove" onclick="event.stopPropagation(); clearSlot('${d}','lunch')">×</button>`
              : `<div class="meal-slot-arrow">+</div>`}
          </div>
        </div>
      </div>`;
  }).join('');
}

// ─── Recipe selector ─────────────────────────────────────
function handleSlotClick(day, type) {
  currentSlot = { day, type };
  document.getElementById('modal-title').textContent = `${DAY_LABELS[day]} — ${MEAL_LABELS[type]}`;
  document.getElementById('recipe-search').value = '';
  setFilter('all');
  renderRecipeList('');
  document.getElementById('recipe-modal').classList.add('open');
}

function closeRecipeModal() {
  document.getElementById('recipe-modal').classList.remove('open');
  currentSlot = null;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  filterRecipes();
}

function filterRecipes() {
  renderRecipeList(document.getElementById('recipe-search').value.toLowerCase());
}

function renderRecipeList(query) {
  const list = document.getElementById('recipe-list');
  const type = currentSlot ? currentSlot.type : 'breakfast';
  const filtered = Object.entries(RECIPES).filter(([id, r]) => {
    if (r.type !== type) return false;
    if (currentFilter !== 'all' && !r.tags.includes(currentFilter)) return false;
    if (query && !r.name.toLowerCase().includes(query) && !r.tags.some(t => t.includes(query))) return false;
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = '<p style="color:var(--text-muted);font-size:0.9rem;text-align:center;padding:20px">No recipes found</p>';
    return;
  }

  list.innerHTML = filtered.map(([id, r]) => `
    <div class="recipe-card" onclick="selectRecipe('${id}')">
      <h3>${r.name}</h3>
      <p>${r.source} · ${r.servings} servings</p>
      <div class="recipe-tags">${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function selectRecipe(id) {
  if (!currentSlot) return;
  const { day, type } = currentSlot;
  if (!state.week[day]) state.week[day] = {};
  state.week[day][type] = id;
  save();
  closeRecipeModal();
  renderDays();
}

function clearSlot(day, type) {
  if (!state.week[day]) return;
  delete state.week[day][type];
  save();
  renderDays();
}

// ─── Recipe detail ───────────────────────────────────────
function showRecipeDetail(id) {
  const r = RECIPES[id];
  if (!r) return;
  document.getElementById('recipe-detail-content').innerHTML = `
    <button onclick="closeDetailModal()" style="position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:none;background:var(--surface-hover);color:var(--text-muted);font-size:1.2rem;cursor:pointer">×</button>
    <h2 style="font-size:1.3rem;color:var(--primary);margin-bottom:8px">${r.name}</h2>
    <div class="detail-meta">
      <span>Source: <a href="${r.sourceUrl}" target="_blank" rel="noopener noreferrer">${r.source}</a></span>
      <span>${r.servings} servings</span>
    </div>
    <div class="recipe-tags">${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <div class="detail-ingredients">
      <h4>Ingredients</h4>
      <ul>${r.ingredients.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>
    <div class="detail-method">
      <h4>Method</h4>
      <ol>${r.method.map(s => `<li>${s}</li>`).join('')}</ol>
    </div>
  `;
  document.getElementById('detail-modal').classList.add('open');
}

function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('open');
}

// ─── Shopping ─────────────────────────────────────────────
const AISLES = {
  'Bakery': ['bread','sourdough','baguette','roll','bagel','brioche','flatbread','tortilla'],
  'Meat & Fish': ['chicken','bacon','sausage','prawn','salmon','cod','crab','pork','egg'],
  'Dairy': ['milk','yogurt','butter','cheese','mozzarella','feta','cream','parmesan'],
  'Fresh Produce': ['tomato','avocado','cucumber','pepper','onion','garlic','carrot','lettuce','celery','basil','coriander','lemon','lime','apple','banana','berries','grapes','walnuts','seeds','samphire','fennel','ginger','thyme','dill'],
  'Pantry': ['oats','flour','rice','pasta','noodles','lentils','chickpeas','beans','edamame','stock','honey','sugar','oil','olive oil','sesame oil','soy sauce','vinegar','harissa','curry powder','cumin','paprika','chilli','salt','peanut butter','houmous','pickle','baked beans','sun-dried','capers','olives','balsamic'],
  'Frozen': ['frozen']
};

function getShoppingItems() {
  const items = {};
  const servings = state.servings || 2;
  for (const day of DAYS) {
    const plan = state.week[day];
    if (!plan) continue;
    for (const type of ['breakfast','lunch']) {
      const rid = plan[type];
      if (!rid) continue;
      const r = RECIPES[rid];
      if (!r || !r.ingredients) continue;
      const scale = servings / r.servings;
      for (const ing of r.ingredients) {
        const m = ing.match(/^(\d+(?:[.,]\d+)?\s*(?:g|ml|kg|tbsp|tsp|oz|lb|cm|mm)?)\s*/);
        const qty = m ? parseFloat(m[1]) * scale : 1;
        let name = m ? ing.slice(m[0].length).trim() : ing;
        name = name.replace(/^[\s\-\u2013\u2014\,\.]+/, '').trim();
        if (!name) continue;
        if (items[name]) items[name].qty += qty;
        else items[name] = { qty, checked: !!state._checked[name] };
      }
    }
  }
  for (const s of state.staples) {
    const n = s.trim();
    if (!items[n]) items[n] = { qty: 1, checked: !!state._checked[n] };
  }
  return items;
}

function getAisle(name) {
  const l = name.toLowerCase();
  for (const [a, ks] of Object.entries(AISLES)) {
    if (ks.some(k => l.includes(k))) return a;
  }
  return 'Other';
}

function renderShopping() {
  const list = document.getElementById('shopping-list');
  const items = getShoppingItems();
  const sorted = Object.entries(items).sort(([a],[b]) => getAisle(a).localeCompare(getAisle(b)));

  if (sorted.length === 0) {
    list.innerHTML = '<div class="shopping-empty">No meals planned yet. Add some meals to generate your shopping list.</div>';
    return;
  }

  const groups = {};
  for (const [n, d] of sorted) {
    const a = getAisle(n);
    if (!groups[a]) groups[a] = [];
    groups[a].push([n, d]);
  }

  list.innerHTML = Object.entries(groups).map(([aisle, items]) => `
    <div class="aisle-group">
      <div class="aisle-title">${aisle}</div>
      ${items.map(([n, d]) => `
        <div class="shopping-list-item ${d.checked ? 'checked' : ''}" onclick="toggleItem('${n.replace(/'/g,"\\'")}')">
          <input type="checkbox" ${d.checked ? 'checked' : ''} onclick="event.stopPropagation();toggleItem('${n.replace(/'/g,"\\'")}')">
          <span>${n}</span>
          <span class="qty">×${d.qty % 1 === 0 ? d.qty : d.qty.toFixed(1)}</span>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function toggleItem(name) {
  state._checked[name] = !state._checked[name];
  save();
  renderShopping();
}

function clearChecked() {
  state._checked = {};
  save();
  renderShopping();
}

function copyShoppingList() {
  const items = getShoppingItems();
  const lines = [];
  const groups = {};
  for (const [n, d] of Object.entries(items)) {
    const a = getAisle(n);
    if (!groups[a]) groups[a] = [];
    groups[a].push(`${d.checked ? '✓' : '○'} ${n} ×${d.qty % 1 === 0 ? d.qty : d.qty.toFixed(1)}`);
  }
  for (const [a, items] of Object.entries(groups)) {
    lines.push(`${a}:`);
    lines.push(...items);
    lines.push('');
  }
  const text = lines.join('\n').trim();

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('Shopping list copied!');
    }).catch(() => {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('Shopping list copied!');
  } catch(e) {
    showToast('Copy failed — try selecting text manually');
  }
  document.body.removeChild(ta);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Staples ──────────────────────────────────────────────
function renderStaples() {
  const list = document.getElementById('staples-list');
  list.innerHTML = state.staples.map(s => `
    <span class="staple-tag" onclick="removeStaple('${s.replace(/'/g,"\\'")}')">${s} ×</span>
  `).join('');
}
function addStaple() {
  const v = document.getElementById('staple-input').value.trim();
  if (!v || state.staples.includes(v)) return;
  state.staples.push(v);
  save();
  document.getElementById('staple-input').value = '';
  renderStaples();
  renderShopping();
}
function removeStaple(name) {
  state.staples = state.staples.filter(s => s !== name);
  save();
  renderStaples();
  renderShopping();
}

// ─── Boot ────────────────────────────────────────────────
document.addEventListener('click', (e) => {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('open');
  }
});

init();
</script>
</body>
</html>
